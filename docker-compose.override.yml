# Local self-hosting overrides (not committed to the app's normal workflow).
# Adds restart policies so the whole stack survives crashes / host reboots —
# the base docker-compose.yml defines none.
services:
  api:
    restart: unless-stopped
  worker:
    restart: unless-stopped
  beat:
    restart: unless-stopped
  redis:
    restart: unless-stopped
  minio:
    restart: unless-stopped
