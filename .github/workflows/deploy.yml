name: Deploy

on:
  push:
    branches: [master]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check app tests

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest

  deploy:
    name: Deploy to home server
    runs-on: ubuntu-latest
    needs: [lint, test]
    concurrency: deploy-group # prevent overlapping deploys
    steps:
      - name: Trigger home-server deploy (Cloudflare Tunnel webhook)
        run: |
          curl -fsS --max-time 30 -X POST https://hooks.vodongha.id.vn/deploy/family-budget \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}"
