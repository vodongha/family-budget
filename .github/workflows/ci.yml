name: CI

on:
  push:
    branches: [develop]
  pull_request:
    # Run on PRs into develop too — Dependabot now targets develop, and the
    # auto-merge workflow keys off this CI run completing, so without it a
    # Dependabot PR would never be checked or merged.
    branches: [develop, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Test (pytest — SQLite in-memory, no ADB needed)
        run: pytest
