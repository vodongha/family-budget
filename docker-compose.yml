services:
  api:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      # Mount the unzipped ADB wallet read-only. WALLET_DIR in .env must match the target.
      - ./wallet:/app/wallet:ro
    depends_on:
      - redis

  worker:
    build: .
    command: celery -A app.core.celery_app.celery worker --loglevel=info
    env_file: .env
    volumes:
      - ./wallet:/app/wallet:ro
    depends_on:
      - redis

  beat:
    build: .
    command: celery -A app.core.celery_app.celery beat --loglevel=info
    env_file: .env
    volumes:
      - ./wallet:/app/wallet:ro
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  minio-data:
