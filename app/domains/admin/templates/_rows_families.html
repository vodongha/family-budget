<tbody class="dt-body">
  {% if page.items %}
  {% for r in page.items %}
  <tr>
    <td><a href="/admin/families/{{ r.family.rid }}">{{ r.family.name }}</a></td>
    <td>{{ r.members }}</td>
    <td>{{ r.wallets }}</td>
    <td>{% if r.family.is_deleted %}<span class="pill pill-warn">deleted</span>{% else %}<span class="pill pill-ok">active</span>{% endif %}</td>
    <td>{{ r.family.created_at.strftime('%Y-%m-%d %H:%M') if r.family.created_at else '—' }}</td>
  </tr>
  {% endfor %}
  {% else %}
  <tr><td colspan="{{ columns|length }}" class="dt-empty">No families.</td></tr>
  {% endif %}
</tbody>
