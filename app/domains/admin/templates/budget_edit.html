{% extends "shell.html" %}
{% block title %}Edit budget{% endblock %}
{% block heading %}Edit budget{% endblock %}
{% block content %}
<form class="form" method="post" action="/admin/budgets/{{ budget.rid }}/edit">
  <input type="hidden" name="csrf" value="{{ csrf }}">
  <input type="hidden" name="family_rid" value="{{ family_rid }}">
  <div class="kv" style="margin-bottom:16px;">
    <div class="k">Category</div><div class="v">{{ budget.category.name if budget.category else '—' }}</div>
  </div>
  <div class="field">
    <label>Monthly limit (VND)</label>
    <input name="amount" inputmode="numeric" value="{{ budget.amount }}" required>
  </div>
  <div class="actions">
    <button class="btn-primary" type="submit">Save</button>
    <a class="btn" href="{{ back }}">Cancel</a>
  </div>
</form>
{% endblock %}
