{% extends "base.html" %}
{% block title %}Sign in{% endblock %}
{% block body %}
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
  <form method="post" action="/admin/login"
        style="width:100%; max-width:360px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:28px;">
    <div class="brand" style="padding:0 0 18px;">Famo <span>Admin</span></div>
    {% if error %}
      <div style="background:rgba(248,81,73,.12); color:var(--danger); border:1px solid var(--danger);
                  padding:9px 12px; border-radius:8px; margin-bottom:16px; font-size:13px;">
        {{ error }}
      </div>
    {% endif %}
    <input type="hidden" name="csrf" value="{{ csrf }}">
    <label style="display:block; color:var(--muted); font-size:13px; margin-bottom:6px;">Email</label>
    <input name="email" type="email" autocomplete="username" required autofocus
           style="width:100%; margin-bottom:16px; padding:10px 12px; background:var(--bg);
                  border:1px solid var(--border); border-radius:8px; color:var(--text); font:inherit;">
    <label style="display:block; color:var(--muted); font-size:13px; margin-bottom:6px;">Password</label>
    <input name="password" type="password" autocomplete="current-password" required
           style="width:100%; margin-bottom:22px; padding:10px 12px; background:var(--bg);
                  border:1px solid var(--border); border-radius:8px; color:var(--text); font:inherit;">
    <button type="submit"
            style="width:100%; padding:11px; background:var(--primary); color:#fff; border:none;
                   border-radius:8px; font:inherit; font-weight:600; cursor:pointer;">
      Sign in
    </button>
  </form>
</div>
{% endblock %}
