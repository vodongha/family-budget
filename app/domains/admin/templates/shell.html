{% extends "base.html" %}
{% block body %}
<div class="layout">
  <aside class="sidebar">
    <div class="brand">Famo <span>Admin</span></div>
    <nav class="nav">
      <a href="/admin" class="{{ 'active' if active == 'dashboard' else '' }}">Dashboard</a>
      <a href="/admin/users" class="{{ 'active' if active == 'users' else '' }}">Users</a>
      <a href="/admin/families" class="{{ 'active' if active == 'families' else '' }}">Families</a>
      <a href="/admin/audit" class="{{ 'active' if active == 'audit' else '' }}">Audit log</a>
    </nav>
  </aside>
  <main class="main">
    <div class="topbar">
      <h1>{% block heading %}{% endblock %}</h1>
      <div style="display:flex; align-items:center; gap:12px;">
        <span class="who">{{ admin.display_name }} · {{ admin.email }}</span>
        <form method="post" action="/admin/logout" style="margin:0;">
          <input type="hidden" name="csrf" value="{{ csrf }}">
          <button class="btn" type="submit">Sign out</button>
        </form>
      </div>
    </div>
    {% block content %}{% endblock %}
  </main>
</div>
{% endblock %}
