<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>{% block title %}Admin{% endblock %} · Famo</title>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --surface-2: #1c2128;
      --border: #30363d; --text: #e6edf3; --muted: #8b949e;
      --primary: #6e7bf2; --accent: #2f81f7;
      --danger: #f85149; --warn: #d29922; --ok: #3fb950;
      --radius: 10px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 220px; flex-shrink: 0; background: var(--surface);
      border-right: 1px solid var(--border); padding: 20px 14px; position: sticky; top: 0; height: 100vh;
    }
    .brand { font-weight: 800; font-size: 18px; padding: 0 8px 18px; letter-spacing: -.3px; }
    .brand span { color: var(--primary); }
    .nav a {
      display: block; padding: 9px 10px; border-radius: 8px; color: var(--text);
      margin-bottom: 2px;
    }
    .nav a:hover { background: var(--surface-2); text-decoration: none; }
    .nav a.active { background: var(--surface-2); color: var(--primary); font-weight: 600; }
    .main { flex: 1; min-width: 0; padding: 24px 28px 48px; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 22px; gap: 12px;
    }
    .topbar h1 { font-size: 20px; margin: 0; }
    .who { color: var(--muted); font-size: 13px; }
    .btn {
      background: var(--surface-2); color: var(--text); border: 1px solid var(--border);
      padding: 6px 12px; border-radius: 8px; cursor: pointer; font: inherit;
    }
    .btn:hover { border-color: var(--muted); }
    .btn-danger { color: var(--danger); border-color: var(--danger); }
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px;
    }
    .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    .card .value { font-size: 26px; font-weight: 800; margin-top: 6px; }
    .card .sub { color: var(--muted); font-size: 12px; margin-top: 4px; }
    section { margin-top: 30px; }
    section h2 { font-size: 15px; color: var(--muted); font-weight: 600; margin: 0 0 12px; }
    table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
    th { color: var(--muted); font-weight: 600; background: var(--surface-2); }
    tr:last-child td { border-bottom: none; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; }
    .pill-ok { background: rgba(63,185,80,.15); color: var(--ok); }
    .pill-warn { background: rgba(210,153,34,.15); color: var(--warn); }
    .empty { color: var(--muted); padding: 14px; }
    code { background: var(--surface-2); padding: 1px 6px; border-radius: 6px; }
  </style>
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
